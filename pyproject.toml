[project]
name = "templateto_reports"
version = "1.0.0"
description = "Replace wkhtmltopdf with modern Chrome-based PDF rendering in Frappe/ERPNext"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "TemplateTo", email = "david@templateto.com" }]
# Frappe Cloud Marketplace requires a bounded Frappe dependency in pyproject.toml.
# The `main` branch supports both Frappe 15 and 16; the `version-15` and
# `version-16` branches narrow this to a single major.
dependencies = ["requests", "frappe>=15.0,<17.0"]

[build-system]
requires = ["flit_core>=3.4"]
build-backend = "flit_core.buildapi"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]
